<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>mirrorball</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #000000;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      cursor: none;
    }
    html.dragging, html.dragging body { cursor: none; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; cursor: none; }
    #hud {
      position: fixed;
      left: 12px;
      bottom: max(10px, env(safe-area-inset-bottom));
      z-index: 5;
      color: rgba(200, 220, 255, 0.45);
      font: 11px/1.35 system-ui, sans-serif;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }
    #hud.hidden { display: none; }
    #touch-bar {
      display: none;
      position: fixed;
      left: 8px; right: 8px;
      bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 10;
      gap: 6px;
      grid-template-columns: repeat(4, 1fr);
    }
    html.input-touch #touch-bar,
    html.device-phone #touch-bar,
    html.device-tablet #touch-bar {
      display: grid;
    }
    html.input-touch #hud,
    html.device-phone #hud,
    html.device-tablet #hud {
      bottom: 60px;
    }
    #touch-bar button {
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid rgba(140, 180, 255, 0.35);
      background: rgba(8, 10, 18, 0.9);
      color: #d0e4ff;
      font: 600 11px/1 system-ui, sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    #touch-bar button:active { background: rgba(60, 90, 160, 0.45); }
  </style>
  <script src="device.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
</head>
<body>
  <div id="hud">drag orbit · space auto-spin · r reset · h hud</div>
  <div id="touch-bar" aria-label="Touch controls">
    <button type="button" data-act="spin">Spin</button>
    <button type="button" data-act="reset">Reset</button>
    <button type="button" data-act="pulse">Flash</button>
    <button type="button" data-act="hud">Hud</button>
  </div>
<script>
/**
 * mirrorball — mirrored orb on pure black
 *
 * Why drag felt “broken”: a perfect sphere + view-space env map is almost
 * orbit-invariant (center always reflects “behind camera”). Cube faces make
 * orbit obvious; a ball does not. Fix = world-fixed studio lights via
 * uYaw/uPitch so reflections slide when you orbit.
 *
 * Input path = same as working mirrorcube (p5 mouse/touch).
 *
 * drag orbit · space auto-spin · r reset · h hud · p flash
 */

const V_SRC = `
precision mediump float;
attribute vec3 aPosition;
attribute vec3 aNormal;
varying vec3 vNormal;
varying vec3 vViewPos;
uniform mat4 uModelViewMatrix;
uniform mat4 uProjectionMatrix;
uniform mat3 uNormalMatrix;
void main() {
  vec4 viewPos = uModelViewMatrix * vec4(aPosition, 1.0);
  vViewPos = viewPos.xyz;
  vNormal = normalize(uNormalMatrix * aNormal);
  gl_Position = uProjectionMatrix * viewPos;
}
`;

const F_SRC = `
precision mediump float;
varying vec3 vNormal;
varying vec3 vViewPos;
uniform float uTime;
uniform float uFlash;
uniform float uYaw;
uniform float uPitch;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

// map view-space direction into a world-ish frame locked to orbit angles
vec3 toWorld(vec3 v) {
  float cp = cos(uPitch), sp = sin(uPitch);
  float cy = cos(uYaw), sy = sin(uYaw);
  // inverse of camera orbit (pitch then yaw)
  // cam looks from (sy*cp, sp, cy*cp)
  vec3 r = v;
  // undo pitch around X
  r = vec3(r.x, cp * r.y - sp * r.z, sp * r.y + cp * r.z);
  // undo yaw around Y
  r = vec3(cy * r.x + sy * r.z, r.y, -sy * r.x + cy * r.z);
  return r;
}

vec3 envMap(vec3 rView) {
  // WORLD-fixed environment — this is what makes orbit readable on a sphere
  vec3 r = normalize(toWorld(rView));

  vec3 col = vec3(0.0);

  // asymmetric ground / sky so orientation is obvious
  float ground = smoothstep(0.05, -0.4, r.y);
  col += vec3(0.03, 0.03, 0.035) * ground;
  float zenith = pow(max(r.y, 0.0), 1.6);
  col += vec3(0.03, 0.04, 0.08) * zenith;

  // fixed studio keys in world space (plus slow drift)
  float t = uTime * 0.2;
  vec3 l1 = normalize(vec3(0.8, 0.55, 0.3));
  vec3 l2 = normalize(vec3(-0.6, 0.25, 0.7));
  vec3 l3 = normalize(vec3(0.1, 0.9, -0.4));
  // slight drift so still alive when idle
  l1 = normalize(l1 + 0.15 * vec3(sin(t), 0.0, cos(t)));
  l2 = normalize(l2 + 0.12 * vec3(cos(t * 0.7), 0.0, sin(t * 0.7)));

  col += vec3(1.0, 0.98, 0.95) * pow(max(dot(r, l1), 0.0), 70.0) * 1.5;
  col += vec3(0.65, 0.8, 1.0) * pow(max(dot(r, l2), 0.0), 100.0) * 1.1;
  col += vec3(1.0, 0.85, 0.7) * pow(max(dot(r, l3), 0.0), 45.0) * 0.85;

  // long softbox strip in world azimuth — slides hard when you orbit
  float az = atan(r.z, r.x); // -pi..pi
  float strip = exp(-pow(r.y - 0.25, 2.0) * 28.0)
    * exp(-pow(sin(az * 0.5 - 0.4), 2.0) * 14.0);
  col += vec3(0.9, 0.93, 1.0) * strip * 0.7;

  // warm accent opposite side (breaks left/right symmetry)
  float warm = exp(-pow(length(r - normalize(vec3(-0.7, 0.15, -0.5))), 2.0) * 8.0);
  col += vec3(1.0, 0.55, 0.3) * warm * 0.45;

  // cool accent
  float cool = exp(-pow(length(r - normalize(vec3(0.5, 0.4, 0.7))), 2.0) * 10.0);
  col += vec3(0.4, 0.7, 1.0) * cool * 0.35;

  float sp = hash(floor(r.xy * 36.0 + r.z * 10.0));
  if (sp > 0.96) {
    col += vec3(0.7) * (sp - 0.96) * 10.0 * max(r.y + 0.2, 0.0);
  }

  col += vec3(0.18, 0.2, 0.24) * uFlash;
  return col;
}

void main() {
  vec3 N = normalize(vNormal);
  vec3 V = normalize(-vViewPos);
  if (dot(N, V) < 0.0) N = -N;

  vec3 R = reflect(-V, N);
  vec3 refl = envMap(R);

  float ndv = max(dot(N, V), 0.0);
  float fres = pow(1.0 - ndv, 4.0);
  float mixAmt = 0.8 + 0.2 * fres;

  vec3 base = vec3(0.018, 0.02, 0.026);
  vec3 col = mix(base, refl, mixAmt);

  // view-space key for a little contact sparkle
  vec3 L = normalize(vec3(0.4, 0.8, 0.5));
  vec3 H = normalize(L + V);
  col += vec3(1.0) * pow(max(dot(N, H), 0.0), 240.0) * 0.75;

  float rim = pow(1.0 - ndv, 2.8);
  col += vec3(0.3, 0.4, 0.55) * rim * 0.28;

  col = col / (1.0 + col * 0.35);
  col = pow(max(col, 0.0), vec3(0.95));
  gl_FragColor = vec4(col, 1.0);
}
`;

let sh;
let autoSpin = true;
let showHud = true;
let flash = 0;
let isPhone = false;

// same orbit state as mirrorcube
let yaw = 0.55;
let pitch = 0.35;
let targetYaw = 0.55;
let targetPitch = 0.35;
let dist = 480;
let targetDist = 480;
let dragging = false;
let lastX = 0;
let lastY = 0;
let velYaw = 0;
let velPitch = 0;
let ballR = 180;
let spinT = 0;

function setup() {
  const prof = window.DeviceProfile && DeviceProfile.get && DeviceProfile.get();
  isPhone = !!(prof && prof.isPhone);

  let dpr = window.devicePixelRatio || 1;
  if (isPhone) dpr = Math.min(dpr, 1.5);
  else dpr = Math.min(dpr, 2);

  createCanvas(windowWidth, windowHeight, WEBGL);
  pixelDensity(dpr);
  setAttributes('antialias', true);
  frameRate(60);

  sh = createShader(V_SRC, F_SRC);
  // match cube on-screen size roughly
  ballR = Math.min(width, height) * 0.14;
  dist = ballR * 5.4;
  targetDist = dist;

  noStroke();
  wireTouchBar();
  wireWheel();
}

function hitTouchBar() {
  try {
    if (typeof event !== 'undefined' && event && event.target && event.target.closest) {
      return !!event.target.closest('#touch-bar');
    }
  } catch (e) { /* ignore */ }
  return false;
}

function applyOrbit(dx, dy) {
  const s = 0.012;
  yaw -= dx * s;
  pitch += dy * s;
  pitch = constrain(pitch, -1.25, 1.25);
  targetYaw = yaw;
  targetPitch = pitch;
  velYaw = -dx * s * 0.45;
  velPitch = dy * s * 0.45;
}

function draw() {
  const dt = Math.min(deltaTime / 1000, 0.05);
  if (flash > 0) flash *= 0.94;

  // same drag sampling as working mirrorcube
  if (mouseIsPressed && dragging) {
    const dx = mouseX - lastX;
    const dy = mouseY - lastY;
    if (dx !== 0 || dy !== 0) {
      applyOrbit(dx, dy);
      lastX = mouseX;
      lastY = mouseY;
    }
  }

  if (autoSpin && !dragging) {
    yaw += 0.45 * dt;
    targetYaw = yaw;
    spinT += dt;
  }

  if (!dragging) {
    yaw += velYaw;
    pitch += velPitch;
    pitch = constrain(pitch, -1.25, 1.25);
    targetYaw = yaw;
    targetPitch = pitch;
    velYaw *= 0.92;
    velPitch *= 0.92;
    if (Math.abs(velYaw) < 1e-5) velYaw = 0;
    if (Math.abs(velPitch) < 1e-5) velPitch = 0;
  }

  dist = lerp(dist, targetDist, 0.15);

  background(0);

  const cx = dist * Math.cos(pitch) * Math.sin(yaw);
  const cy = dist * Math.sin(pitch);
  const cz = dist * Math.cos(pitch) * Math.cos(yaw);
  camera(cx, cy, cz, 0, 0, 0, 0, 1, 0);
  perspective(PI / 3.0, width / Math.max(height, 1), 1, dist * 10);

  push();
  // keep ball orientation fixed — orbit is camera-only (readable via world env)
  shader(sh);
  sh.setUniform('uTime', millis() / 1000);
  sh.setUniform('uFlash', flash);
  sh.setUniform('uYaw', yaw);
  sh.setUniform('uPitch', pitch);

  const detail = isPhone ? 40 : 64;
  sphere(ballR, detail, Math.max(24, (detail * 0.75) | 0));
  resetShader();
  pop();

  const hud = document.getElementById('hud');
  if (hud) hud.classList.toggle('hidden', !showHud);
}

function mousePressed() {
  if (hitTouchBar()) return;
  dragging = true;
  document.documentElement.classList.add('dragging');
  lastX = mouseX;
  lastY = mouseY;
  velYaw = 0;
  velPitch = 0;
}

function mouseDragged() {
  if (!dragging) return false;
  applyOrbit(mouseX - lastX, mouseY - lastY);
  lastX = mouseX;
  lastY = mouseY;
  return false;
}

function mouseReleased() {
  dragging = false;
  document.documentElement.classList.remove('dragging');
}

function touchStarted() {
  if (hitTouchBar()) return true;
  dragging = true;
  document.documentElement.classList.add('dragging');
  lastX = mouseX;
  lastY = mouseY;
  velYaw = 0;
  velPitch = 0;
  return false;
}

function touchMoved() {
  if (!dragging) return false;
  applyOrbit(mouseX - lastX, mouseY - lastY);
  lastX = mouseX;
  lastY = mouseY;
  return false;
}

function touchEnded() {
  dragging = false;
  document.documentElement.classList.remove('dragging');
}

function wireWheel() {
  window.addEventListener('wheel', (ev) => {
    targetDist = constrain(targetDist + ev.deltaY * 0.4, ballR * 2.2, ballR * 12);
    ev.preventDefault();
  }, { passive: false });
}

function keyPressed() {
  if (key === ' ') autoSpin = !autoSpin;
  if (key === 'r' || key === 'R') doReset();
  if (key === 'h' || key === 'H') showHud = !showHud;
  if (key === 'p' || key === 'P') flash = 1;
}

function doReset() {
  yaw = 0.55;
  pitch = 0.35;
  targetYaw = yaw;
  targetPitch = pitch;
  targetDist = ballR * 5.4;
  dist = targetDist;
  velYaw = 0;
  velPitch = 0;
  flash = 0;
  spinT = 0;
}

function windowResized() {
  let dpr = window.devicePixelRatio || 1;
  if (isPhone) dpr = Math.min(dpr, 1.5);
  else dpr = Math.min(dpr, 2);
  pixelDensity(dpr);
  resizeCanvas(windowWidth, windowHeight);
  ballR = Math.min(width, height) * 0.14;
  targetDist = constrain(targetDist, ballR * 2.2, ballR * 12);
}

function wireTouchBar() {
  const bar = document.getElementById('touch-bar');
  if (!bar) return;
  bar.querySelectorAll('button').forEach((btn) => {
    btn.addEventListener('pointerdown', (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      const act = btn.getAttribute('data-act');
      if (act === 'spin') autoSpin = !autoSpin;
      if (act === 'reset') doReset();
      if (act === 'pulse') flash = 1;
      if (act === 'hud') showHud = !showHud;
    });
  });
}
</script>
</body>
</html>
