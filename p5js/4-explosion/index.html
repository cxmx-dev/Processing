<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>4-explosion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #02040c;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas { display: block; width: 100%; height: 100%; }
    #touch-bar {
      display: none;
      position: fixed;
      left: 8px; right: 8px; bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 10;
      gap: 6px;
      grid-template-columns: repeat(4, 1fr);
    }
    html.input-touch #touch-bar, html.device-phone #touch-bar, html.device-tablet #touch-bar {
      display: grid;
    }
    #touch-bar button {
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid rgba(255, 140, 60, 0.45);
      background: rgba(8, 6, 14, 0.9);
      color: #ffd8b0;
      font: 600 11px/1 system-ui, sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    #touch-bar button:active { background: rgba(180, 70, 20, 0.5); }
  </style>
  <script src="device.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
</head>
<body>
  <div id="touch-bar" aria-label="Touch controls">
    <button type="button" data-act="pause">Pause</button>
    <button type="button" data-act="boom">Boom</button>
    <button type="button" data-act="clear">Clear</button>
    <button type="button" data-act="reset">Reset</button>
  </div>
<script>
/**
 * 4-explosion — radial space blast with fireball + wreckage debris
 * Reference: orange cauliflower fireball, white core, flying metal scrap,
 * flame jets, teal nebula wash. Abstract debris (no detailed ships).
 *
 * space pause · b / click boom · c clear · r reseed
 */

let stars = [];
let nebulaBlobs = [];
let blasts = [];
let paused = false;
let nextAutoAt = 0;
let seedN = 0;

const MAX_DEBRIS = 220;
const MAX_EMBERS = 400;
const MAX_JETS = 40;
const MAX_SMOKE = 80;

function setup() {
  createCanvas(windowWidth, windowHeight);
  const p = window.DeviceProfile && DeviceProfile.get && DeviceProfile.get();
  const dpr = (p && p.isPhone)
    ? Math.min(window.devicePixelRatio || 1, 1.75)
    : Math.min(window.devicePixelRatio || 1, 2);
  pixelDensity(dpr);
  colorMode(RGB, 255, 255, 255, 255);
  seedBackground();
  background(4, 6, 16);
  spawnBlast(width * 0.5, height * 0.5, 1);
  nextAutoAt = millis() + 3400;
  wireTouchBar();
}

function seedBackground() {
  stars = [];
  nebulaBlobs = [];
  const n = Math.floor(Math.min(width, height) * 0.3 + 60);
  for (let i = 0; i < n; i++) {
    const roll = random();
    stars.push({
      x: random(width),
      y: random(height),
      r: random(0.4, 2.2),
      b: random(70, 255),
      tw: random(TWO_PI),
      sp: random(0.006, 0.028),
      blue: roll < 0.15
    });
  }
  // teal / cyan nebula washes (like reference)
  for (let i = 0; i < 7; i++) {
    nebulaBlobs.push({
      x: random(width),
      y: random(height),
      w: random(width * 0.25, width * 0.55),
      h: random(height * 0.15, height * 0.4),
      a: random(10, 22),
      hueShift: random()
    });
  }
}

function draw() {
  background(4, 6, 16);
  drawNebula();
  drawStars();

  if (!paused) {
    for (let i = blasts.length - 1; i >= 0; i--) {
      blasts[i].update();
      if (blasts[i].dead) blasts.splice(i, 1);
    }
    if (millis() >= nextAutoAt || blasts.length === 0) {
      autoBoom();
    }
  }

  // draw oldest first so newest sits on top
  for (let i = 0; i < blasts.length; i++) {
    blasts[i].display();
  }

  const prof = window.DeviceProfile && DeviceProfile.get && DeviceProfile.get();
  if (!prof || !prof.isTouch) {
    fill(255, 210, 170, 80);
    noStroke();
    textSize(11);
    textAlign(LEFT, BASELINE);
    text("space pause  ·  click / b boom  ·  c clear  ·  r reseed", 12, height - 14);
  }
}

function drawNebula() {
  noStroke();
  for (let i = 0; i < nebulaBlobs.length; i++) {
    const n = nebulaBlobs[i];
    if (n.hueShift < 0.5) fill(20, 80, 120, n.a);
    else fill(40, 50, 100, n.a * 0.85);
    ellipse(n.x, n.y, n.w, n.h);
  }
}

function drawStars() {
  noStroke();
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    const tw = 0.5 + 0.5 * sin(millis() * s.sp + s.tw);
    if (s.blue) fill(140, 190, 255, s.b * tw * 0.45);
    else fill(255, 250, 240, s.b * tw * 0.4);
    ellipse(s.x, s.y, s.r * tw, s.r * tw);
  }
}

function autoBoom() {
  let x = width * 0.5;
  let y = height * 0.5;
  let sc = random(0.9, 1.12);
  if (random() < 0.2) {
    x += randomGaussian() * width * 0.05;
    y += randomGaussian() * height * 0.05;
  }
  spawnBlast(x, y, sc);
  nextAutoAt = millis() + random(3000, 4200);
}

function spawnBlast(x, y, scale) {
  seedN++;
  blasts.push(new MegaBlast(x, y, scale, seedN * 13331));
  while (blasts.length > 2) blasts.shift();
}

/**
 * Full radial detonation: lobed fireball + metal scrap + flame jets + embers.
 */
class MegaBlast {
  constructor(x, y, scale, nseed) {
    this.x = x;
    this.y = y;
    this.scale = scale || 1;
    this.t = 0;
    this.speed = random(0.0045, 0.006);
    this.dead = false;
    this.nseed = nseed || random(99999);

    // cauliflower fire lobes
    this.lobes = [];
    const lobeN = 16 + Math.floor(random(8));
    for (let i = 0; i < lobeN; i++) {
      const a = random(TWO_PI);
      this.lobes.push({
        ox: cos(a) * random(0.05, 0.5),
        oy: sin(a) * random(0.05, 0.5),
        r: random(0.22, 0.55),
        phase: random(TWO_PI),
        wobble: random(0.5, 1.3)
      });
    }
    for (let i = 0; i < 6; i++) {
      this.lobes.push({
        ox: random(-0.18, 0.18),
        oy: random(-0.18, 0.18),
        r: random(0.45, 0.85),
        phase: random(TWO_PI),
        wobble: random(0.3, 0.7)
      });
    }

    this.debris = [];
    this.embers = [];
    this.jets = [];
    this.smoke = [];
    this.spawnBurst();
  }

  spawnBurst() {
    const sc = this.scale;
    const dN = Math.floor((90 + random(40)) * sc);
    for (let i = 0; i < dN && this.debris.length < MAX_DEBRIS; i++) {
      this.debris.push(new Debris(0, 0, sc));
    }
    const eN = Math.floor((160 + random(80)) * sc);
    for (let i = 0; i < eN && this.embers.length < MAX_EMBERS; i++) {
      this.embers.push(new Ember(0, 0, sc));
    }
    const jN = Math.floor((14 + random(10)) * sc);
    for (let i = 0; i < jN && this.jets.length < MAX_JETS; i++) {
      this.jets.push(new FlameJet(0, 0, sc));
    }
    const sN = Math.floor((20 + random(16)) * sc);
    for (let i = 0; i < sN && this.smoke.length < MAX_SMOKE; i++) {
      this.smoke.push(new Smoke(0, 0, sc));
    }
  }

  update() {
    this.t += this.speed;
    if (this.t >= 1) this.dead = true;

    for (let i = this.debris.length - 1; i >= 0; i--) {
      this.debris[i].update();
      if (this.debris[i].dead) this.debris.splice(i, 1);
    }
    for (let i = this.embers.length - 1; i >= 0; i--) {
      this.embers[i].update();
      if (this.embers[i].dead) this.embers.splice(i, 1);
    }
    for (let i = this.jets.length - 1; i >= 0; i--) {
      this.jets[i].update();
      if (this.jets[i].dead) this.jets.splice(i, 1);
    }
    for (let i = this.smoke.length - 1; i >= 0; i--) {
      this.smoke[i].update();
      if (this.smoke[i].dead) this.smoke.splice(i, 1);
    }
  }

  envelope() {
    const t = this.t;
    if (t < 0.08) return easeOutCubic(t / 0.08);
    if (t < 0.42) return 1;
    return 1 - easeInCubic((t - 0.42) / 0.58);
  }

  fireR() {
    const grow = easeOutCubic(constrain(this.t / 0.5, 0, 1));
    return Math.min(width, height) * 0.22 * this.scale * (0.35 + grow * 0.9);
  }

  display() {
    const env = this.envelope();
    if (env <= 0.01 && this.debris.length === 0) return;

    push();
    translate(this.x, this.y);

    // outer heat glow
    if (env > 0.02) {
      noStroke();
      const R = this.fireR();
      for (let i = 5; i >= 1; i--) {
        fill(255, 100, 20, 8 * env * (i / 5));
        ellipse(0, 0, R * (2.2 + i * 0.4), R * (2.2 + i * 0.4));
      }
    }

    // smoke behind fireball
    for (let i = 0; i < this.smoke.length; i++) this.smoke[i].display(env);

    // flame jets behind debris
    for (let i = 0; i < this.jets.length; i++) this.jets[i].display(env);

    // fireball body
    if (env > 0.02) this.drawFireball(env);

    // embers
    for (let i = 0; i < this.embers.length; i++) this.embers[i].display(env);

    // metal wreckage on top
    for (let i = 0; i < this.debris.length; i++) this.debris[i].display(env);

    pop();
  }

  drawFireball(env) {
    const R = this.fireR();
    const nOff = this.nseed * 0.001 + this.t * 2.2;

    // sorted large → small for layering
    const sorted = this.lobes.slice().sort((a, b) => b.r - a.r);
    noStroke();
    for (let i = 0; i < sorted.length; i++) {
      const L = sorted[i];
      const wob =
        1 +
        0.1 * sin(this.t * 12 + L.phase) * L.wobble +
        0.08 * noise(nOff + L.ox * 4, L.oy * 4);
      const lx = L.ox * R * (0.85 + 0.2 * this.t);
      const ly = L.oy * R * (0.85 + 0.2 * this.t);
      const lr = L.r * R * wob;

      // dark outer fire
      fill(200, 50, 10, 50 * env);
      ellipse(lx, ly, lr * 2.2, lr * 2.05);
      // mid orange
      fill(255, 120, 20, 70 * env);
      ellipse(lx * 0.9, ly * 0.9, lr * 1.75, lr * 1.65);
      // bright yellow
      fill(255, 200, 60, 80 * env);
      ellipse(lx * 0.7, ly * 0.7, lr * 1.2, lr * 1.15);
      // cream tip
      fill(255, 240, 180, 90 * env);
      ellipse(lx * 0.5, ly * 0.5, lr * 0.65, lr * 0.6);
    }

    // extra cauliflower noise blobs
    for (let i = 0; i < 70; i++) {
      const a = (i / 70) * TWO_PI * 3.1 + this.nseed;
      const d = (0.2 + 0.75 * noise(i * 0.19 + nOff)) * R;
      const px = cos(a) * d;
      const py = sin(a) * d;
      const pr = (0.07 + 0.14 * noise(i * 0.27, nOff)) * R;
      const heat = noise(i * 0.13, nOff + 3);
      if (heat > 0.55) fill(255, 230, 120, 55 * env * heat);
      else fill(255, 100, 20, 45 * env);
      ellipse(px, py, pr * 2, pr * 1.9);
    }

    // white-hot core
    for (let i = 5; i >= 1; i--) {
      const f = i / 5;
      fill(255, 250 - i * 15, 200 - i * 25, 100 * env * f);
      ellipse(0, 0, R * 0.55 * f, R * 0.55 * f);
    }
    fill(255, 255, 255, 200 * env);
    ellipse(0, 0, R * 0.2, R * 0.2);
  }
}

/** Angular metal scrap — abstract hull fragments */
class Debris {
  constructor(x, y, scale) {
    this.x = x;
    this.y = y;
    const a = random(TWO_PI);
    const speed = (pow(random(), 0.4) * random(2.5, 11) + random(0.8, 2.5)) * scale;
    this.vx = cos(a) * speed;
    this.vy = sin(a) * speed;
    this.life = 1;
    this.decay = random(0.004, 0.012) / Math.max(0.5, scale);
    this.rot = random(TWO_PI);
    this.spin = random(-0.12, 0.12);
    this.w = random(4, 28) * scale;
    this.h = random(3, 14) * scale;
    this.kind = Math.floor(random(4)); // 0 rect, 1 long, 2 L, 3 chunk
    this.shade = random(25, 70);
    this.glow = random() < 0.35; // edge still burning
    this.dead = false;
    this.drag = random(0.985, 0.995);
  }

  update() {
    this.vx *= this.drag;
    this.vy *= this.drag;
    this.x += this.vx;
    this.y += this.vy;
    this.rot += this.spin;
    this.life -= this.decay;
    if (this.life <= 0) this.dead = true;
  }

  display(env) {
    const L = constrain(this.life * env, 0, 1);
    if (L < 0.02) return;
    push();
    translate(this.x, this.y);
    rotate(this.rot);
    const s = this.shade;
    noStroke();
    fill(s, s + 5, s + 12, 220 * L);

    if (this.kind === 0) {
      rect(-this.w * 0.5, -this.h * 0.5, this.w, this.h, 1);
    } else if (this.kind === 1) {
      rect(-this.w * 0.7, -this.h * 0.25, this.w * 1.4, this.h * 0.5, 1);
      rect(-this.w * 0.2, -this.h * 0.6, this.w * 0.25, this.h * 1.2, 1);
    } else if (this.kind === 2) {
      rect(-this.w * 0.5, -this.h * 0.5, this.w, this.h * 0.4, 1);
      rect(-this.w * 0.5, -this.h * 0.5, this.w * 0.35, this.h, 1);
    } else {
      beginShape();
      vertex(-this.w * 0.5, -this.h * 0.3);
      vertex(this.w * 0.4, -this.h * 0.5);
      vertex(this.w * 0.5, this.h * 0.4);
      vertex(-this.w * 0.3, this.h * 0.5);
      endShape(CLOSE);
    }

    // panel line detail
    stroke(s + 30, s + 35, s + 45, 120 * L);
    strokeWeight(0.8);
    line(-this.w * 0.3, 0, this.w * 0.3, 0);

    if (this.glow) {
      noStroke();
      fill(255, 120, 30, 90 * L);
      ellipse(this.w * 0.2, 0, this.w * 0.35, this.h * 0.4);
    }
    pop();
  }
}

class Ember {
  constructor(x, y, scale) {
    this.x = x;
    this.y = y;
    this.px = x;
    this.py = y;
    const a = random(TWO_PI);
    const speed = random(1.5, 10) * scale;
    this.vx = cos(a) * speed;
    this.vy = sin(a) * speed;
    this.life = 1;
    this.decay = random(0.008, 0.025);
    this.r = random(0.8, 3.5) * scale;
    this.dead = false;
  }

  update() {
    this.px = this.x;
    this.py = this.y;
    this.vx *= 0.98;
    this.vy *= 0.98;
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
    if (this.life <= 0) this.dead = true;
  }

  display(env) {
    const L = constrain(this.life * env, 0, 1);
    if (L < 0.02) return;
    stroke(255, 160 + 60 * L, 40, 160 * L);
    strokeWeight(this.r * L);
    line(this.px, this.py, this.x, this.y);
    noStroke();
    fill(255, 220, 100, 180 * L);
    ellipse(this.x, this.y, this.r * L, this.r * L);
  }
}

/** Long radial flame tongue */
class FlameJet {
  constructor(x, y, scale) {
    this.x = x;
    this.y = y;
    this.a = random(TWO_PI);
    this.len = random(40, 140) * scale;
    this.w = random(4, 14) * scale;
    this.speed = random(3, 8) * scale;
    this.life = 1;
    this.decay = random(0.008, 0.018);
    this.phase = random(TWO_PI);
    this.dead = false;
    this.dist = random(10, 40) * scale;
  }

  update() {
    this.dist += this.speed;
    this.speed *= 0.985;
    this.len *= 0.995;
    this.life -= this.decay;
    if (this.life <= 0) this.dead = true;
  }

  display(env) {
    const L = constrain(this.life * env, 0, 1);
    if (L < 0.02) return;
    const x0 = cos(this.a) * this.dist;
    const y0 = sin(this.a) * this.dist;
    const x1 = cos(this.a) * (this.dist + this.len);
    const y1 = sin(this.a) * (this.dist + this.len);
    const wob = 1 + 0.15 * sin(millis() * 0.02 + this.phase);

    stroke(255, 80, 10, 50 * L);
    strokeWeight(this.w * 2.2 * wob * L);
    line(x0, y0, x1, y1);
    stroke(255, 160, 30, 90 * L);
    strokeWeight(this.w * 1.2 * wob * L);
    line(x0, y0, x1, y1);
    stroke(255, 240, 160, 120 * L);
    strokeWeight(this.w * 0.45 * L);
    line(x0, y0, x1, y1);
  }
}

class Smoke {
  constructor(x, y, scale) {
    this.x = x;
    this.y = y;
    const a = random(TWO_PI);
    const speed = random(0.6, 3.5) * scale;
    this.vx = cos(a) * speed;
    this.vy = sin(a) * speed;
    this.r = random(20, 70) * scale;
    this.life = 1;
    this.decay = random(0.006, 0.014);
    this.dead = false;
  }

  update() {
    this.vx *= 0.99;
    this.vy *= 0.99;
    this.x += this.vx;
    this.y += this.vy;
    this.r *= 1.01;
    this.life -= this.decay;
    if (this.life <= 0) this.dead = true;
  }

  display(env) {
    const L = constrain(this.life * env, 0, 1);
    if (L < 0.02) return;
    noStroke();
    fill(60, 40, 50, 22 * L);
    ellipse(this.x, this.y, this.r * 2, this.r * 1.7);
    fill(40, 50, 70, 12 * L);
    ellipse(this.x * 0.9, this.y * 0.9, this.r * 2.4, this.r * 2);
  }
}

function easeOutCubic(x) {
  return 1 - Math.pow(1 - x, 3);
}
function easeInCubic(x) {
  return x * x * x;
}

function mousePressed() {
  if (event && event.target && event.target.closest && event.target.closest('#touch-bar')) return;
  spawnBlast(mouseX, mouseY, random(0.85, 1.15));
  nextAutoAt = millis() + random(3000, 4000);
}

function touchStarted() {
  if (event && event.target && event.target.closest && event.target.closest('#touch-bar')) {
    return false;
  }
  if (touches && touches.length) {
    spawnBlast(touches[0].x, touches[0].y, random(0.85, 1.15));
    nextAutoAt = millis() + random(3000, 4000);
  }
  return false;
}

function keyPressed() {
  if (key === ' ') paused = !paused;
  if (key === 'b' || key === 'B') {
    spawnBlast(width * 0.5, height * 0.5, 1.05);
    nextAutoAt = millis() + 3400;
  }
  if (key === 'c' || key === 'C') {
    blasts = [];
    background(4, 6, 16);
  }
  if (key === 'r' || key === 'R') {
    blasts = [];
    seedBackground();
    background(4, 6, 16);
    spawnBlast(width * 0.5, height * 0.5, 1);
    nextAutoAt = millis() + 3400;
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  seedBackground();
  background(4, 6, 16);
}

function wireTouchBar() {
  const bar = document.getElementById('touch-bar');
  if (!bar) return;
  bar.querySelectorAll('button').forEach((btn) => {
    btn.addEventListener('pointerdown', (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      const act = btn.getAttribute('data-act');
      if (act === 'pause') paused = !paused;
      if (act === 'boom') {
        spawnBlast(width * 0.5, height * 0.5, 1.05);
        nextAutoAt = millis() + 3400;
      }
      if (act === 'clear') {
        blasts = [];
        background(4, 6, 16);
      }
      if (act === 'reset') {
        blasts = [];
        seedBackground();
        background(4, 6, 16);
        spawnBlast(width * 0.5, height * 0.5, 1);
        nextAutoAt = millis() + 3400;
      }
    });
  });
}
</script>
</body>
</html>
