<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>hexCloud</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #0a0c14;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas { display: block; width: 100%; height: 100%; }
    #touch-bar {
      display: none;
      position: fixed;
      left: 8px; right: 8px; bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 10;
      gap: 6px;
      grid-template-columns: repeat(5, 1fr);
    }
    html.input-touch #touch-bar, html.device-phone #touch-bar, html.device-tablet #touch-bar {
      display: grid;
    }
    #touch-bar button {
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid rgba(120, 180, 220, 0.35);
      background: rgba(10, 14, 24, 0.82);
      color: #c8e8ff;
      font: 600 11px/1 system-ui, sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    #touch-bar button:active { background: rgba(60, 120, 180, 0.4); }
  </style>
  <script src="device.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
</head>
<body>
  <div id="touch-bar" aria-label="Touch controls">
    <button type="button" data-k=" ">Pause</button>
    <button type="button" data-k="h">Hex</button>
    <button type="button" data-k="p">Points</button>
    <button type="button" data-k="r">Reseed</button>
    <button type="button" data-k="]">Rings+</button>
  </div>
<script>
/**
 * hexCloud — generative hex lattice + drifting points (p5.js)
 * Faithful port of sketches/hexCloud/hexCloud.pde
 *
 * space pause · h hex · p points · r reseed · [ ] rings · mouse warp
 */

let rings = 7;
let hexSize = 22;
let paused = false;
let showHex = true;
let showPoints = true;
let t = 0;
let cells = [];
let drift = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  // Cap DPR on phones for performance; still sharp enough
  const p = window.DeviceProfile && DeviceProfile.get && DeviceProfile.get();
  const dpr = (p && p.isPhone) ? Math.min(window.devicePixelRatio || 1, 2) : (window.devicePixelRatio || 1);
  pixelDensity(dpr);
  colorMode(HSB, 360, 100, 100, 100);
  rebuild();
  wireTouchBar();
}

function rebuild() {
  cells = axialDisk(rings);
  drift = [];
  for (let i = 0; i < cells.length; i++) {
    if (random(1) < 0.55) {
      const c = cells[i];
      drift.push(new DriftPoint(c.q, c.r, random(TWO_PI)));
    }
  }
}

function draw() {
  background(230, 18, 8);

  // vignette-ish wash (same as .pde)
  noStroke();
  for (let i = 6; i >= 0; i--) {
    fill(230, 12, 10 + i * 1.2, 18);
    ellipse(width * 0.5, height * 0.5, width * 0.25 * i, height * 0.25 * i);
  }

  push();
  translate(width * 0.5, height * 0.52);

  const breath = 1.0 + 0.035 * sin(t * 0.7);
  const mx = mouseX - width * 0.5;
  const my = mouseY - height * 0.52;

  if (showHex) {
    for (let i = 0; i < cells.length; i++) {
      const c = cells[i];
      const p = axialToPixel(c.q, c.r, hexSize * breath);
      const d = dist(p.x, p.y, mx, my);
      const warp = map(constrain(d, 0, 220), 0, 220, 1.15, 0.92);
      const a = map(constrain(d, 0, 280), 0, 280, 55, 12);
      const hue = (200 + c.q * 8 + c.r * 5 + t * 12) % 360;

      stroke(hue, 35, 85, a);
      strokeWeight(1.1);
      noFill();
      drawHex(p.x * warp, p.y * warp, hexSize * breath * 0.92);
    }
  }

  if (showPoints && !paused) {
    for (let i = 0; i < drift.length; i++) {
      drift[i].update(t, mx, my, breath);
    }
  }

  if (showPoints) {
    strokeWeight(1);
    for (let i = 0; i < drift.length; i++) {
      const a = drift[i];
      for (let j = i + 1; j < drift.length; j++) {
        const b = drift[j];
        const d = dist(a.px, a.py, b.px, b.py);
        if (d < hexSize * 2.4) {
          const alpha = map(d, 0, hexSize * 2.4, 40, 0);
          stroke(190, 30, 90, alpha);
          line(a.px, a.py, b.px, b.py);
        }
      }
    }

    noStroke();
    for (let i = 0; i < drift.length; i++) {
      drift[i].display();
    }
  }

  pop();

  if (!paused) t += 0.016;

  fill(200, 10, 90, 70);
  noStroke();
  textSize(12);
  textAlign(LEFT, BOTTOM);
  text(
    "hexCloud  ·  space pause  h hex  p points  r reseed  [ ] rings (" + rings + ")",
    14,
    height - 12
  );
}

function keyPressed() {
  if (key === " ") paused = !paused;
  if (key === "h" || key === "H") showHex = !showHex;
  if (key === "p" || key === "P") showPoints = !showPoints;
  if (key === "r" || key === "R") {
    t = 0;
    rebuild();
  }
  if (key === "[") {
    rings = max(2, rings - 1);
    rebuild();
  }
  if (key === "]") {
    rings = min(14, rings + 1);
    rebuild();
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

// Touch = mouse for warp; long-press rings- via [
function touchStarted() {
  return false; // prevent scroll/zoom stealing
}
function touchMoved() {
  return false;
}

function wireTouchBar() {
  const bar = document.getElementById('touch-bar');
  if (!bar) return;
  bar.querySelectorAll('button').forEach((btn) => {
    btn.addEventListener('pointerdown', (ev) => {
      ev.preventDefault();
      const k = btn.getAttribute('data-k');
      if (k === ' ') paused = !paused;
      else if (k === 'h') showHex = !showHex;
      else if (k === 'p') showPoints = !showPoints;
      else if (k === 'r') { t = 0; rebuild(); }
      else if (k === ']') { rings = Math.min(14, rings + 1); rebuild(); }
      else if (k === '[') { rings = Math.max(2, rings - 1); rebuild(); }
    });
  });
  // double-tap Rings+ quickly → rings-
  let lastRings = 0;
  const ringsBtn = bar.querySelector('[data-k="]"]');
  if (ringsBtn) {
    ringsBtn.addEventListener('pointerdown', () => {
      const now = Date.now();
      if (now - lastRings < 320) {
        rings = Math.max(2, rings - 2);
        rebuild();
      }
      lastRings = now;
    });
  }
}

// --- hex math (axial) — same formulas as hexCloud.pde ---

function axialDisk(n) {
  const out = [];
  for (let q = -n; q <= n; q++) {
    const r1 = Math.max(-n, -q - n);
    const r2 = Math.min(n, -q + n);
    for (let r = r1; r <= r2; r++) {
      out.push({ q: q, r: r });
    }
  }
  return out;
}

function axialToPixel(q, r, size) {
  // pointy-top axial → pixel (matches Processing sqrt(3) form)
  const s3 = Math.sqrt(3);
  const x = size * (s3 * q + (s3 / 2.0) * r);
  const y = size * (1.5 * r);
  return { x: x, y: y };
}

function drawHex(cx, cy, size) {
  beginShape();
  for (let i = 0; i < 6; i++) {
    const a = TWO_PI * i / 6.0 + PI / 6.0;
    vertex(cx + cos(a) * size, cy + sin(a) * size);
  }
  endShape(CLOSE);
}

class DriftPoint {
  constructor(q, r, phase) {
    this.q = q;
    this.r = r;
    this.phase = phase;
    this.px = 0;
    this.py = 0;
    this.hue = (190 + q * 10 + r * 7 + random(30)) % 360;
  }

  update(time, mx, my, breath) {
    const home = axialToPixel(this.q, this.r, hexSize * breath);
    const wobble =
      4.5 * sin(time * 1.3 + this.phase) +
      2.0 * cos(time * 0.9 + this.phase * 1.7);
    const ang = this.phase + time * 0.4;
    this.px = home.x + cos(ang) * wobble;
    this.py = home.y + sin(ang * 1.1) * wobble;

    const d = dist(this.px, this.py, mx, my);
    const influence = Math.exp((-d * d) / (2 * 140 * 140));
    this.px += (mx - this.px) * influence * 0.18;
    this.py += (my - this.py) * influence * 0.18;
  }

  display() {
    const pulse = 2.2 + 1.4 * sin(t * 2.0 + this.phase);
    fill(this.hue, 45, 95, 85);
    ellipse(this.px, this.py, pulse * 2, pulse * 2);
    fill(this.hue, 20, 100, 35);
    ellipse(this.px, this.py, pulse * 4.5, pulse * 4.5);
  }
}
</script>
</body>
</html>
