<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>2-Aus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #000006;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      cursor: grab;
    }
    html.dragging, html.dragging body { cursor: grabbing; }
    canvas { display: block; width: 100%; height: 100%; }
    #hud {
      position: fixed;
      left: 12px;
      bottom: max(10px, env(safe-area-inset-bottom));
      z-index: 5;
      color: rgba(255, 190, 160, 0.45);
      font: 11px/1.35 system-ui, sans-serif;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
    #hud.hidden { display: none; }
    #loading {
      position: fixed; inset: 0; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      background: #000006; color: #ffc8b0;
      font: 600 13px/1 system-ui, sans-serif;
      letter-spacing: 0.08em; text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #loading.done { opacity: 0; }
    #touch-bar {
      display: none;
      position: fixed;
      left: 8px; right: 8px;
      bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 10;
      gap: 6px;
      grid-template-columns: repeat(4, 1fr);
    }
    html.input-touch #touch-bar,
    html.device-phone #touch-bar,
    html.device-tablet #touch-bar {
      display: grid;
    }
    html.input-touch #hud,
    html.device-phone #hud,
    html.device-tablet #hud {
      bottom: 60px;
    }
    #touch-bar button {
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid rgba(220, 80, 60, 0.45);
      background: rgba(10, 4, 12, 0.9);
      color: #ffc8b0;
      font: 600 11px/1 system-ui, sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    #touch-bar button:active { background: rgba(140, 30, 40, 0.5); }
  </style>
  <script src="device.js"></script>
  <script src="nebula-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
</head>
<body>
  <div id="loading">Seaming sky…</div>
  <div id="hud">drag look · space auto-spin · r reset · h hud · seamless wrap</div>
  <div id="touch-bar" aria-label="Touch controls">
    <button type="button" data-act="spin">Spin</button>
    <button type="button" data-act="reset">Reset</button>
    <button type="button" data-act="pulse">Pulse</button>
    <button type="button" data-act="hud">Hud</button>
  </div>
<script>
/**
 * 2-Aus — seamless skysphere free-look (pure p5.js)
 *
 * Same free-look as 1-Aus, but the plate is rebuilt into a seamless
 * equirectangular wrap before texturing the sphere:
 *   1) horizontal left↔right crossfade (no longitude seam)
 *   2) soft pole fade (hides UV pinch at top/bottom)
 *   3) optional wrap-blur pass on the join strip
 *
 * drag look · space auto-spin · r reset · h hud · p pulse
 */

let plateSrc;
let plate; // seamless buffer used as texture
let ready = false;

let yaw = 0;
let pitch = 0;
let targetYaw = 0;
let targetPitch = 0;
let autoSpin = true;
let showHud = true;
let pulse = 0;
let isPhone = false;
let dragging = false;
let lastX = 0;
let lastY = 0;
let sphereDetail = 48;
let sphereR = 2000;

// match 1-Aus 3× speeds
const SPIN_SPEED = 0.0036;
const SENS_DESKTOP = 0.0135;
const SENS_PHONE = 0.0195;
const SPHERE_YAW = 0.045;
const SPHERE_PITCH_WOBBLE = 0.21;

let sens = SENS_DESKTOP;
let velYaw = 0;
let velPitch = 0;

function preload() {
  const src =
    (typeof window.NEBULA_DATA_URI === 'string' && window.NEBULA_DATA_URI.length > 32)
      ? window.NEBULA_DATA_URI
      : 'nebula.jpg';
  plateSrc = loadImage(src);
}

function setup() {
  const prof = window.DeviceProfile && DeviceProfile.get && DeviceProfile.get();
  isPhone = !!(prof && prof.isPhone);

  let dpr = window.devicePixelRatio || 1;
  const px = window.innerWidth * window.innerHeight;
  if (isPhone) dpr = Math.min(dpr, 1.25);
  else if (px > 2.2e6) dpr = Math.min(dpr, 1.2);
  else dpr = Math.min(dpr, 1.5);

  createCanvas(windowWidth, windowHeight, WEBGL);
  pixelDensity(dpr);
  setAttributes('antialias', true);
  frameRate(60);

  sphereDetail = isPhone ? 36 : 64;
  sphereR = 2000;
  sens = isPhone ? SENS_PHONE : SENS_DESKTOP;

  yaw = 0.15;
  pitch = -0.08;
  targetYaw = yaw;
  targetPitch = pitch;

  noStroke();
  textureMode(NORMAL);
  // REPEAT is safe after horizontal seam bake
  textureWrap(CLAMP);

  // build seamless plate (can be a bit heavy — once at start)
  plate = makeSeamlessPlate(plateSrc, isPhone);
  ready = true;
  const el = document.getElementById('loading');
  if (el) {
    el.classList.add('done');
    setTimeout(() => { el.style.display = 'none'; }, 450);
  }

  wireTouchBar();
  wirePointerLook();
}

/**
 * Bake a seamless skysphere plate from a flat still.
 * - Horizontal: crossfade a blend strip so u=0 meets u=1 cleanly
 * - Vertical: soft pole darkening + slight edge pull to hide pinch
 */
function makeSeamlessPlate(img, phone) {
  if (!img || !img.width) {
    const fallback = createGraphics(64, 32);
    fallback.background(10, 2, 8);
    return fallback;
  }

  // working size — enough for sphere, not full 4k CPU cost
  const maxW = phone ? 1024 : 1536;
  const scale = Math.min(1, maxW / img.width);
  const w = Math.max(64, Math.floor(img.width * scale));
  const h = Math.max(32, Math.floor(img.height * scale));

  // step 1: draw source (cover-fit into buffer if aspect differs)
  const base = createGraphics(w, h);
  base.pixelDensity(1);
  base.background(4, 0, 8);
  // cover fit source into w×h
  const ia = img.width / img.height;
  const ba = w / h;
  let dw, dh, dx, dy;
  if (ia > ba) {
    dh = h;
    dw = h * ia;
    dx = (w - dw) * 0.5;
    dy = 0;
  } else {
    dw = w;
    dh = w / ia;
    dx = 0;
    dy = (h - dh) * 0.5;
  }
  base.image(img, dx, dy, dw, dh);

  // step 2: horizontal seamless — multi-pass overlap blend
  // Copy a left strip onto the right edge with smooth alpha, and vice versa
  const strip = Math.max(24, Math.floor(w * 0.18));
  base.loadPixels();
  const px = base.pixels;
  const dens = 4; // RGBA

  // Pre-read edge columns into temp
  // Blend rightmost `strip` columns toward leftmost columns (and soften)
  for (let y = 0; y < h; y++) {
    for (let s = 0; s < strip; s++) {
      // t: 0 at inner side of strip, 1 at outer edge (u=0 / u=1)
      const t = s / (strip - 1);
      // smoothstep for soft join
      const a = t * t * (3 - 2 * t);

      // left edge column s, right edge column (w-1-s)
      const li = (y * w + s) * dens;
      const ri = (y * w + (w - 1 - s)) * dens;

      // average both sides into both edges so wrap is continuous
      const rMix = px[li] * 0.5 + px[ri] * 0.5;
      const gMix = px[li + 1] * 0.5 + px[ri + 1] * 0.5;
      const bMix = px[li + 2] * 0.5 + px[ri + 2] * 0.5;

      // toward the outer edge, force toward mix; keep center of image intact
      px[li]     = px[li]     * (1 - a) + rMix * a;
      px[li + 1] = px[li + 1] * (1 - a) + gMix * a;
      px[li + 2] = px[li + 2] * (1 - a) + bMix * a;

      px[ri]     = px[ri]     * (1 - a) + rMix * a;
      px[ri + 1] = px[ri + 1] * (1 - a) + gMix * a;
      px[ri + 2] = px[ri + 2] * (1 - a) + bMix * a;
    }
  }

  // step 3: pole soften — fade top/bottom toward horizontal wrap average
  // so sphere poles don't show a hard image edge
  const pole = Math.max(12, Math.floor(h * 0.12));
  for (let y = 0; y < pole; y++) {
    const tTop = 1 - y / pole;
    const aTop = tTop * tTop * (3 - 2 * tTop) * 0.85;
    const tBot = 1 - y / pole;
    const aBot = tBot * tBot * (3 - 2 * tBot) * 0.85;
    const yb = h - 1 - y;

    for (let x = 0; x < w; x++) {
      // sample a mid-row ring color as soft pole fill (wrap-safe x)
      const midY = (h * 0.35) | 0;
      const mi = (midY * w + x) * dens;
      const mr = px[mi];
      const mg = px[mi + 1];
      const mb = px[mi + 2];

      const ti = (y * w + x) * dens;
      px[ti]     = px[ti]     * (1 - aTop) + mr * aTop * 0.35 + 4 * aTop;
      px[ti + 1] = px[ti + 1] * (1 - aTop) + mg * aTop * 0.25 + 1 * aTop;
      px[ti + 2] = px[ti + 2] * (1 - aTop) + mb * aTop * 0.3 + 8 * aTop;

      const bi = (yb * w + x) * dens;
      px[bi]     = px[bi]     * (1 - aBot) + mr * aBot * 0.35 + 4 * aBot;
      px[bi + 1] = px[bi + 1] * (1 - aBot) + mg * aBot * 0.25 + 1 * aBot;
      px[bi + 2] = px[bi + 2] * (1 - aBot) + mb * aBot * 0.3 + 8 * aBot;
    }
  }

  // step 4: light horizontal blur on join strips only (kills residual seam)
  const blurW = Math.max(8, (strip * 0.45) | 0);
  blurVerticalStrips(px, w, h, dens, blurW);

  base.updatePixels();
  return base;
}

/** Cheap box blur on left/right edge columns only */
function blurVerticalStrips(px, w, h, dens, blurW) {
  const copy = new Uint8ClampedArray(px);
  const radius = 2;
  for (let y = 0; y < h; y++) {
    for (let pass = 0; pass < 2; pass++) {
      const x0 = pass === 0 ? 0 : w - blurW;
      const x1 = pass === 0 ? blurW : w;
      for (let x = x0; x < x1; x++) {
        let r = 0, g = 0, b = 0, n = 0;
        for (let dx = -radius; dx <= radius; dx++) {
          // wrap X for true seamless blur across the join
          let xx = x + dx;
          if (xx < 0) xx += w;
          if (xx >= w) xx -= w;
          for (let dy = -radius; dy <= radius; dy++) {
            let yy = y + dy;
            if (yy < 0 || yy >= h) continue;
            const i = (yy * w + xx) * dens;
            r += copy[i];
            g += copy[i + 1];
            b += copy[i + 2];
            n++;
          }
        }
        const o = (y * w + x) * dens;
        px[o] = r / n;
        px[o + 1] = g / n;
        px[o + 2] = b / n;
      }
    }
  }
}

function draw() {
  if (!ready) {
    background(0);
    return;
  }

  const t = millis() * 0.001;
  if (pulse > 0) pulse *= 0.96;

  if (autoSpin && !dragging) {
    targetYaw += SPIN_SPEED;
  }

  if (!dragging) {
    targetYaw += velYaw;
    targetPitch += velPitch;
    velYaw *= 0.94;
    velPitch *= 0.94;
    if (Math.abs(velYaw) < 1e-5) velYaw = 0;
    if (Math.abs(velPitch) < 1e-5) velPitch = 0;
  }

  yaw = lerp(yaw, targetYaw, 0.22);
  pitch = lerp(pitch, targetPitch, 0.22);
  pitch = constrain(pitch, -HALF_PI + 0.02, HALF_PI - 0.02);
  targetPitch = constrain(targetPitch, -HALF_PI + 0.02, HALF_PI - 0.02);

  background(0);

  const lx = Math.cos(pitch) * Math.sin(yaw);
  const ly = Math.sin(pitch);
  const lz = Math.cos(pitch) * Math.cos(yaw);
  camera(0, 0, 0, lx, ly, lz, 0, 1, 0);
  perspective(PI / 2.4, width / Math.max(height, 1), 1, sphereR * 3);

  const glow = 255 * (0.92 + 0.08 * Math.sin(t * 0.4) + pulse * 0.12);

  // seamless skysphere (inside)
  push();
  scale(-1, 1, 1);
  rotateY(t * SPHERE_YAW);
  rotateX(Math.sin(t * SPHERE_PITCH_WOBBLE) * 0.02);

  if (plate) {
    texture(plate);
  } else {
    fill(40, 10, 15);
  }
  tint(glow, glow * 0.98, glow * 0.95);
  sphere(sphereR, sphereDetail, Math.max(18, (sphereDetail * 0.7) | 0));
  noTint();
  pop();

  push();
  scale(-1, 1, 1);
  noStroke();
  fill(0, 0, 8, 16);
  sphere(sphereR * 0.22, 16, 12);
  pop();

  const hud = document.getElementById('hud');
  if (hud) hud.classList.toggle('hidden', !showHud);
}

function applyLookDelta(dx, dy) {
  targetYaw -= dx * sens;
  targetPitch += dy * sens;
  targetPitch = constrain(targetPitch, -HALF_PI + 0.02, HALF_PI - 0.02);
  velYaw = -dx * sens * 0.35;
  velPitch = dy * sens * 0.35;
}

function wirePointerLook() {
  const onDown = (ev) => {
    if (ev.target && ev.target.closest && ev.target.closest('#touch-bar')) return;
    dragging = true;
    document.documentElement.classList.add('dragging');
    const pt = pointerPos(ev);
    lastX = pt.x;
    lastY = pt.y;
    velYaw = 0;
    velPitch = 0;
  };

  const onMove = (ev) => {
    if (!dragging) return;
    const pt = pointerPos(ev);
    const dx = pt.x - lastX;
    const dy = pt.y - lastY;
    lastX = pt.x;
    lastY = pt.y;
    applyLookDelta(dx, dy);
    ev.preventDefault();
  };

  const onUp = () => {
    dragging = false;
    document.documentElement.classList.remove('dragging');
  };

  window.addEventListener('pointerdown', onDown, { passive: true });
  window.addEventListener('pointermove', onMove, { passive: false });
  window.addEventListener('pointerup', onUp, { passive: true });
  window.addEventListener('pointercancel', onUp, { passive: true });
}

function pointerPos(ev) {
  if (ev.touches && ev.touches[0]) {
    return { x: ev.touches[0].clientX, y: ev.touches[0].clientY };
  }
  return { x: ev.clientX, y: ev.clientY };
}

function keyPressed() {
  if (key === ' ') autoSpin = !autoSpin;
  if (key === 'r' || key === 'R') doReset();
  if (key === 'h' || key === 'H') showHud = !showHud;
  if (key === 'p' || key === 'P') pulse = 1;
}

function doReset() {
  targetYaw = 0.15;
  targetPitch = -0.08;
  yaw = targetYaw;
  pitch = targetPitch;
  velYaw = 0;
  velPitch = 0;
  pulse = 0;
}

function windowResized() {
  let dpr = window.devicePixelRatio || 1;
  const px = window.innerWidth * window.innerHeight;
  if (isPhone) dpr = Math.min(dpr, 1.25);
  else if (px > 2.2e6) dpr = Math.min(dpr, 1.2);
  else dpr = Math.min(dpr, 1.5);
  pixelDensity(dpr);
  resizeCanvas(windowWidth, windowHeight);
}

function wireTouchBar() {
  const bar = document.getElementById('touch-bar');
  if (!bar) return;
  bar.querySelectorAll('button').forEach((btn) => {
    btn.addEventListener('pointerdown', (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      const act = btn.getAttribute('data-act');
      if (act === 'spin') autoSpin = !autoSpin;
      if (act === 'reset') doReset();
      if (act === 'pulse') pulse = 1;
      if (act === 'hud') showHud = !showHud;
    });
  });
}

function touchStarted() {
  if (event && event.target && event.target.closest && event.target.closest('#touch-bar')) {
    return true;
  }
  return false;
}
function touchMoved() {
  return false;
}
</script>
</body>
</html>
